# Skill category taxonomy and metric mapping.
# Each category lists the metrics used to score a skill of that type.
# metric kinds:
#   deterministic - computed in code from the run output vs the case's `expected` block
#   judge         - blind LLM judge (3 votes, arm identity hidden), rubric below
#   meta          - derived from run telemetry (latency, failures), no expected needed
# weight: relative weight inside the category composite (normalized at aggregation time)
# direction: higher | lower (lower means smaller is better, e.g. broken-link rate)

metrics:
  exact_match:
    kind: deterministic
    direction: higher
    expected_type: exact
  field_f1:
    kind: deterministic
    direction: higher
    expected_type: fields
  precision_at_k:
    kind: deterministic
    direction: higher
    expected_type: ranking
  hit_at_k:
    kind: deterministic
    direction: higher
    expected_type: ranking
  mrr:
    kind: deterministic
    direction: higher
    expected_type: ranking
  rouge_l:
    kind: deterministic
    direction: higher
    expected_type: text
  edge_f1:
    kind: deterministic
    direction: higher
    expected_type: edges
  render_success_rate:
    kind: deterministic
    direction: higher
    expected_type: diagram
  broken_link_rate:
    kind: deterministic
    direction: lower
    expected_type: links
  update_success_rate:
    kind: deterministic
    direction: higher
    expected_type: checks
  latency:
    kind: meta
    direction: lower
  failure_rate:
    kind: meta
    direction: lower
  factual_consistency:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 how factually consistent the response is with the provided
      source material and the task prompt. 5 = every claim is supported;
      1 = major fabrications or contradictions.
  readability:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 the readability of the response for its intended audience:
      structure, clarity, appropriate length. 5 = clear and well organized;
      1 = confusing or unusable.
  template_coverage:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 how completely the response covers the sections/fields the
      task's template or requirements demand. 5 = all required sections
      present and filled; 1 = most sections missing or empty.
  citation_coverage:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 how well claims in the response cite their sources (file
      paths, line references, links). 5 = every non-obvious claim is traceable;
      1 = no citations.
  structure_consistency:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 how consistent the proposed organization/structure is:
      naming, hierarchy, no duplicated homes for the same content.
      5 = fully consistent; 1 = contradictory or duplicated structure.
  actionable_suggestion_rate:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 what fraction of the suggestions are concrete and directly
      actionable (name the file/function, state the change). 5 = all
      actionable; 1 = vague advice only.
  unsafe_suggestion_rate:
    kind: judge
    direction: lower
    rubric: >
      Score 1-5 how UNSAFE the suggestions are (behavior changes disguised as
      refactors, deleting used code, breaking APIs). 5 = multiple unsafe
      suggestions; 1 = none.
  stale_detection_quality:
    kind: judge
    direction: higher
    rubric: >
      Score 1-5 how accurately the response identifies stale/outdated
      documentation (precision and recall against the evidence in the prompt).
      5 = finds exactly the stale parts; 1 = misses them or flags fresh content.

categories:
  doc_authoring:
    title: "Documentation authoring (generate, document, update)"
    metrics:
      template_coverage: 0.25
      factual_consistency: 0.30
      citation_coverage: 0.15
      readability: 0.15
      broken_link_rate: 0.15
  doc_maintenance:
    title: "Documentation maintenance (refresh, delta, status)"
    metrics:
      stale_detection_quality: 0.35
      update_success_rate: 0.35
      latency: 0.10
      failure_rate: 0.20
  doc_organization:
    title: "Documentation organization (organize, navigate)"
    metrics:
      update_success_rate: 0.30
      broken_link_rate: 0.25
      structure_consistency: 0.30
      readability: 0.15
  refactoring_guidance:
    title: "Refactoring guidance (refactor)"
    metrics:
      actionable_suggestion_rate: 0.40
      unsafe_suggestion_rate: 0.35
      readability: 0.25
  traceability_mapping:
    title: "Traceability and EDS-to-code mapping"
    metrics:
      precision_at_k: 0.40
      mrr: 0.40
      citation_coverage: 0.20
  retrieval:
    title: "Code and file retrieval for answers"
    metrics:
      precision_at_k: 0.35
      hit_at_k: 0.35
      mrr: 0.30
  extraction:
    title: "ID and field extraction"
    metrics:
      field_f1: 0.50
      exact_match: 0.50
  summarization:
    title: "Module and doc summarization"
    metrics:
      rouge_l: 0.40
      factual_consistency: 0.40
      readability: 0.20
  diagram_generation:
    title: "Diagram generation from code and docs"
    metrics:
      render_success_rate: 0.45
      edge_f1: 0.45
      readability: 0.10
  doc_update_workflow:
    title: "Doc update and refresh workflows"
    metrics:
      update_success_rate: 0.45
      broken_link_rate: 0.35
      latency: 0.10
      failure_rate: 0.10
